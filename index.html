<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comité de Producto · G66</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569' },
              brand: { DEFAULT: '#0ea5e9', dark: '#0284c7', light: '#e0f2fe' }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      * { font-family: 'Inter', sans-serif; }
      @media print {
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        body { background: white !important; }
      }
      .print-only { display: none; }
    </style>
  <script>
    // SPA redirect fix for GitHub Pages — handle ?p= from 404.html
    (function() {
      var p = window.location.search.match(/[?&]p=([^&]+)/);
      if (p) {
        var decoded = decodeURIComponent(p[1]);
        var q = decoded.match(/&q=(.*)/);
        var path = q ? decoded.slice(0, decoded.indexOf('&q=')) : decoded;
        var query = q ? '?' + decodeURIComponent(q[1]) : '';
        window.history.replaceState(null, null, '/' + path + query + window.location.hash);
      }
    })();
  </script>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
